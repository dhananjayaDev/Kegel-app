<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{% block title %}Kegel Health{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='icons/kegel.png') }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/kegel.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}?v=53">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="site-frame">
    {% include 'components/header.html' %}
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% include 'components/footer.html' %}
  {% block scripts %}{% endblock %}
</body>
</html>
